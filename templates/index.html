<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Analyser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-dark text-white">

    <nav class="navbar navbar-dark bg-black px-4">
        <span class="navbar-brand fw-bold fs-4">🎵 Song Analyser</span>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card bg-secondary text-white shadow">
                    <div class="card-body p-4">
                        

                        {% with messages = get_flashed_messages() %}
                            {% if messages %}
                                {% for message in messages %}
                                    <div class="alert alert-danger">{{ message }}</div>
                                {% endfor %}
                            {% endif %}
                         {% endwith %}
                        <h2 class="card-title text-center mb-1">Analyse Your Song</h2>
                        <p class="text-center text-light mb-4">Upload an MP3 or WAV file to get your full musical breakdown.</p>

                        <form action="/analyse" method="POST" enctype="multipart/form-data">

                            <div class="mb-3">
                                <label class="form-label">Upload Audio File</label>
                                <input type="file" name="audio" accept=".mp3,.wav" class="form-control" required>
                                <small class="text-light">MP3 or WAV only. Max 10MB.</small>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Select Your Instrument</label>
                                <select name="instrument" class="form-select">
                                    <option value="guitar">Guitar</option>
                                    <option value="piano">Piano</option>
                                    <option value="bass">Bass</option>
                                    <option value="ukulele">Ukulele</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg">Analyse Song</button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
